<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard F5/F6 - Clean Dark Mode</title>
    
    <!-- React & ReactDOM (v18) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (untuk JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Prop Types -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
    
    <!-- PapaParse & SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- html2canvas & jsPDF for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        /* Gemini-like Dark Mode Palette */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #131314; /* Gemini Main Background */
            color: #e3e3e3; 
        } 
        
        /* Flat Cards - No Borders, No Shadows */
        .card-flat { 
            background-color: #1e1f20; /* Gemini Surface Background */
            border-radius: 1rem;
        }

        /* Flat Inputs & Items */
        .input-flat {
            background-color: #282a2c;
            color: #e3e3e3;
            border: none;
            outline: none;
        }
        .input-flat:hover, .input-flat:focus {
            background-color: #333538;
        }

        .list-item-flat {
            background-color: #282a2c;
            border: none;
        }
        .list-item-flat:hover {
            background-color: #333538;
        }
        
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        @media (min-width: 640px) { .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; } }
        .custom-scrollbar::-webkit-scrollbar-track { background: #131314; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #444746; border-radius: 4px; } 
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #5f6368; } 
        
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        option { background-color: #1e1f20; color: #e3e3e3; }
    </style>
</head>
<body class="selection:bg-blue-500/30 text-[#e3e3e3]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            AreaChart, Area, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, BarChart, Bar 
        } = window.Recharts || {};

        const COLORS = ['#8ab4f8', '#81c995', '#fde293', '#fcad70', '#c58af9', '#6ee7b7'];
        const MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];

        // Clean Tooltip
        const tooltipStyle = {
            backgroundColor: '#282a2c', 
            border: 'none', 
            color: '#e3e3e3',
            borderRadius: '8px',
            padding: '12px'
        };

        // --- Icons ---
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const IconCompare = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 3h5v5M4 21v-7a4 4 0 0 1 4-4h11M8 21H3v-5M20 3v7a4 4 0 0 1-4 4H5"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#81c995" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconTrending = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const IconFilter = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
        const IconChevronDown = () => <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;

        const App = () => {
            const [appMode, setAppMode] = useState('welcome');
            const [dashboardType, setDashboardType] = useState('single');
            
            const [rawData, setRawData] = useState([]);
            const [filteredData, setFilteredData] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isExporting, setIsExporting] = useState(false);

            const [tempFileF5, setTempFileF5] = useState(null);
            const [tempFileF6, setTempFileF6] = useState(null);

            const [filterProv, setFilterProv] = useState("All");
            const [filterKab, setFilterKab] = useState("All");
            const [filterProd, setFilterProd] = useState("All");
            const [filterDistributor, setFilterDistributor] = useState("All");

            const [metricWilayah, setMetricWilayah] = useState("Penyaluran");
            const [metricDistributor, setMetricDistributor] = useState("Penyaluran");

            const parseIndonesianNumber = (val) => {
                if (val === undefined || val === null || val === '') return 0;
                if (typeof val === 'number') return val;
                
                let strVal = val.toString().trim();
                
                if (strVal.includes(',') && strVal.includes('.')) {
                    const lastComma = strVal.lastIndexOf(',');
                    const lastDot = strVal.lastIndexOf('.');
                    if (lastComma > lastDot) strVal = strVal.replace(/\./g, '').replace(/,/g, '.');
                    else strVal = strVal.replace(/,/g, '');
                } 
                else if (strVal.includes(',')) strVal = strVal.replace(/,/g, '.');
                else if (strVal.split('.').length > 2) strVal = strVal.replace(/\./g, '');
                
                return parseFloat(strVal) || 0;
            };

            const processFile = (file, datasetTag, callback) => {
                const fileExt = file.name.split('.').pop().toLowerCase();

                const cleanData = (arrayOfArrays) => {
                    let headerIndex = -1;
                    for (let i = 0; i < Math.min(arrayOfArrays.length, 10); i++) {
                        const rowStr = (arrayOfArrays[i] || []).join('').toLowerCase();
                        if (rowStr.includes('produsen') || rowStr.includes('distributor') || rowStr.includes('provinsi')) {
                            headerIndex = i;
                            break;
                        }
                    }
                    if (headerIndex === -1) headerIndex = 0;

                    const headers = arrayOfArrays[headerIndex].map(h => typeof h === 'string' ? h.trim().toLowerCase() : '');
                    
                    const getColIdx = (keys) => {
                        for (let k of keys) {
                            const idx = headers.findIndex(h => h === k);
                            if (idx !== -1) return idx;
                        }
                        return -1;
                    };

                    const cols = {
                        produsen: getColIdx(['produsen', 'kode produsen']),
                        distributor: getColIdx(['nama distributor', 'distributor']),
                        pengecer: getColIdx(['nama pengecer', 'pengecer']),
                        bulan: getColIdx(['bulan']),
                        provinsi: getColIdx(['nama provinsi', 'provinsi']),
                        kabupaten: getColIdx(['nama kota/kabupaten', 'nama kota/kab', 'kabupaten', 'kota']),
                        kecamatan: getColIdx(['nama kecamatan', 'kecamatan']),
                        produk: getColIdx(['produk']),
                        stokAwal: getColIdx(['stok awal']),
                        penebusan: getColIdx(['penebusan']),
                        penyaluran: getColIdx(['penyaluran']),
                        stokAkhir: getColIdx(['stok akhir'])
                    };

                    const formattedData = [];
                    for (let i = headerIndex + 1; i < arrayOfArrays.length; i++) {
                        const row = arrayOfArrays[i];
                        if (!row || row.length === 0) continue;

                        const bulanVal = parseInt(row[cols.bulan]) || 0;
                        if (bulanVal <= 0) continue; 

                        const stokAwal = parseIndonesianNumber(row[cols.stokAwal]);
                        const penebusan = parseIndonesianNumber(row[cols.penebusan]);
                        const penyaluran = parseIndonesianNumber(row[cols.penyaluran]);
                        const stokAkhir = parseIndonesianNumber(row[cols.stokAkhir]);

                        if (penebusan > 0 || penyaluran > 0 || stokAwal > 0 || stokAkhir > 0) {
                            formattedData.push({
                                dataset: datasetTag,
                                Produsen: cols.produsen !== -1 ? (row[cols.produsen] || "N/A") : "N/A",
                                Nama_Distributor: cols.distributor !== -1 ? (row[cols.distributor] || "Unknown") : "Unknown",
                                Nama_Pengecer: cols.pengecer !== -1 ? (row[cols.pengecer] || "") : "",
                                Bulan: bulanVal,
                                Provinsi: cols.provinsi !== -1 ? (row[cols.provinsi] || "Unknown") : "Unknown",
                                Kabupaten: cols.kabupaten !== -1 ? (row[cols.kabupaten] || "Unknown") : "Unknown",
                                Kecamatan: cols.kecamatan !== -1 ? (row[cols.kecamatan] || "Unknown") : "Unknown",
                                Produk: cols.produk !== -1 ? (row[cols.produk] || "Unknown") : "Unknown",
                                Stok_Awal: stokAwal,
                                Penebusan: penebusan,
                                Penyaluran: penyaluran,
                                Stok_Akhir: stokAkhir
                            });
                        }
                    }
                    return formattedData;
                };

                if (fileExt === 'csv') {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        Papa.parse(e.target.result, {
                            header: false,
                            skipEmptyLines: true,
                            complete: (results) => callback(cleanData(results.data))
                        });
                    };
                    reader.readAsText(file);
                } else if (fileExt === 'xlsx' || fileExt === 'xls') {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0]; 
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" }); 
                        callback(cleanData(json));
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    console.error("Format file tidak didukung");
                    callback([]);
                }
            };

            const handleSingleUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsProcessing(true);
                processFile(file, 'Single', (data) => {
                    setTimeout(() => {
                        setRawData(data);
                        setFilteredData(data);
                        setDashboardType('single');
                        setAppMode('dashboard');
                        setIsProcessing(false);
                        resetFilters();
                    }, 500);
                });
            };

            const executeComparison = () => {
                if (!tempFileF5 || !tempFileF6) return;
                setIsProcessing(true);
                processFile(tempFileF5, 'F5', (dataF5) => {
                    processFile(tempFileF6, 'F6', (dataF6) => {
                        setTimeout(() => {
                            const combinedData = [...dataF5, ...dataF6];
                            setRawData(combinedData);
                            setFilteredData(combinedData);
                            setDashboardType('compare');
                            setAppMode('dashboard');
                            setIsProcessing(false);
                            resetFilters();
                        }, 500);
                    });
                });
            };

            const resetFilters = () => {
                setFilterProv("All"); setFilterKab("All"); setFilterProd("All"); setFilterDistributor("All");
            };

            const exportToPDF = async () => {
                const dashboardElement = document.getElementById('dashboard-export-area');
                if (!dashboardElement) return;

                setIsExporting(true);
                try {
                    // Gunakan html2canvas untuk memfoto div area dashboard
                    const canvas = await html2canvas(dashboardElement, {
                        scale: 2, // Kualitas resolusi tinggi
                        backgroundColor: '#131314', // Sama dengan warna background tema
                        useCORS: true,
                        logging: false
                    });
                    
                    const imgData = canvas.toDataURL('image/png');
                    
                    // Inisialisasi jsPDF (Landscape, satuan mm, kertas A4)
                    const pdf = new window.jspdf.jsPDF({
                        orientation: 'landscape',
                        unit: 'mm',
                        format: 'a4'
                    });

                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    
                    // Hitung rasio agar gambar proporsional di dalam kertas PDF
                    const imgProps = pdf.getImageProperties(imgData);
                    const ratio = Math.min(pdfWidth / imgProps.width, pdfHeight / imgProps.height);
                    
                    const imgWidth = imgProps.width * ratio;
                    const imgHeight = imgProps.height * ratio;
                    
                    // Posisi gambar agar berada di tengah kertas
                    const marginX = (pdfWidth - imgWidth) / 2;
                    const marginY = (pdfHeight - imgHeight) / 2;

                    pdf.addImage(imgData, 'PNG', marginX, marginY, imgWidth, imgHeight);
                    pdf.save(`Dashboard_${dashboardType === 'compare' ? 'F5_F6' : 'F5/F6'}_${new Date().toISOString().slice(0,10)}.pdf`);
                } catch (error) {
                    console.error("Gagal export PDF:", error);
                    alert("Terjadi kesalahan saat mengekspor PDF.");
                } finally {
                    setIsExporting(false);
                }
            };

            useEffect(() => {
                let temp = rawData;
                if (filterProv !== "All") temp = temp.filter(d => d.Provinsi === filterProv);
                if (filterKab !== "All") temp = temp.filter(d => d.Kabupaten === filterKab);
                if (filterProd !== "All") temp = temp.filter(d => d.Produk === filterProd);
                if (filterDistributor !== "All") temp = temp.filter(d => d.Nama_Distributor === filterDistributor);
                setFilteredData(temp);
            }, [filterProv, filterKab, filterProd, filterDistributor, rawData]);

            // --- DATA AGGREGATION ---
            const kpiSingle = useMemo(() => ({
                totalPenyaluran: filteredData.reduce((acc, curr) => acc + curr.Penyaluran, 0),
                totalPenebusan: filteredData.reduce((acc, curr) => acc + curr.Penebusan, 0),
                avgStokAkhir: filteredData.length ? filteredData.reduce((acc, curr) => acc + curr.Stok_Akhir, 0) / filteredData.length : 0,
                uniqueDistributors: new Set(filteredData.map(d => d.Nama_Distributor)).size
            }), [filteredData]);

            const kpiCompare = useMemo(() => {
                const dataF5 = filteredData.filter(d => d.dataset === 'F5');
                const dataF6 = filteredData.filter(d => d.dataset === 'F6');
                return {
                    F5_Penyaluran: dataF5.reduce((acc, curr) => acc + curr.Penyaluran, 0),
                    F6_Penyaluran: dataF6.reduce((acc, curr) => acc + curr.Penyaluran, 0),
                    F5_Penebusan: dataF5.reduce((acc, curr) => acc + curr.Penebusan, 0),
                    F6_Penebusan: dataF6.reduce((acc, curr) => acc + curr.Penebusan, 0),
                };
            }, [filteredData]);

            const trendData = useMemo(() => {
                const grouped = {};
                filteredData.forEach(d => {
                    if (!grouped[d.Bulan]) grouped[d.Bulan] = { name: MONTH_NAMES[d.Bulan-1], Penyaluran: 0, Penebusan: 0, F5_Penyaluran: 0, F6_Penyaluran: 0 };
                    if (dashboardType === 'single') {
                        grouped[d.Bulan].Penyaluran += d.Penyaluran;
                        grouped[d.Bulan].Penebusan += d.Penebusan;
                    } else {
                        if (d.dataset === 'F5') grouped[d.Bulan].F5_Penyaluran += d.Penyaluran;
                        if (d.dataset === 'F6') grouped[d.Bulan].F6_Penyaluran += d.Penyaluran;
                    }
                });
                return Object.values(grouped).sort((a,b) => MONTH_NAMES.indexOf(a.name) - MONTH_NAMES.indexOf(b.name));
            }, [filteredData, dashboardType]);

            const productData = useMemo(() => {
                const grouped = {};
                filteredData.forEach(d => {
                    if (!grouped[d.Produk]) grouped[d.Produk] = { name: d.Produk, value: 0, F5_Value: 0, F6_Value: 0 };
                    if (dashboardType === 'single') grouped[d.Produk].value += d.Penyaluran;
                    else {
                        if (d.dataset === 'F5') grouped[d.Produk].F5_Value += d.Penyaluran;
                        if (d.dataset === 'F6') grouped[d.Produk].F6_Value += d.Penyaluran;
                    }
                });
                return Object.values(grouped).sort((a,b) => (b.value || b.F6_Value) - (a.value || a.F6_Value));
            }, [filteredData, dashboardType]);

            const wilayahData = useMemo(() => {
                const grouped = {};
                const groupKey = filterProv === "All" ? "Provinsi" : "Kabupaten";
                filteredData.forEach(d => {
                    if (!grouped[d[groupKey]]) grouped[d[groupKey]] = 0;
                    grouped[d[groupKey]] += d[metricWilayah]; 
                });
                return Object.entries(grouped).map(([name, value]) => ({ name, value })).sort((a,b) => b.value - a.value).slice(0, 10); 
            }, [filteredData, metricWilayah, filterProv]);

            const distributorData = useMemo(() => {
                const grouped = {};
                filteredData.forEach(d => {
                    if (!grouped[d.Nama_Distributor]) grouped[d.Nama_Distributor] = 0;
                    grouped[d.Nama_Distributor] += d[metricDistributor];
                });
                return Object.entries(grouped).map(([name, value]) => ({ name, value })).sort((a,b) => b.value - a.value).slice(0, 10); 
            }, [filteredData, metricDistributor]);

            const uniqueProvinces = useMemo(() => [...new Set(rawData.map(d => d.Provinsi))].filter(Boolean).sort(), [rawData]);
            const uniqueKabupaten = useMemo(() => {
                let options = rawData;
                if (filterProv !== "All") options = options.filter(d => d.Provinsi === filterProv);
                return [...new Set(options.map(d => d.Kabupaten))].filter(Boolean).sort();
            }, [rawData, filterProv]);
            const uniqueProducts = useMemo(() => [...new Set(rawData.map(d => d.Produk))].filter(Boolean).sort(), [rawData]);
            const uniqueDistributors = useMemo(() => [...new Set(rawData.map(d => d.Nama_Distributor))].filter(Boolean).sort(), [rawData]);

            const formatNumber = (num) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(num);
            const formatYAxis = (tickItem) => {
                if (tickItem >= 1000000) return (tickItem / 1000000).toLocaleString('id-ID', { maximumFractionDigits: 1 }) + ' jt';
                else if (tickItem >= 1000) return (tickItem / 1000).toLocaleString('id-ID', { maximumFractionDigits: 1 }) + ' rb';
                return tickItem.toLocaleString('id-ID');
            };

            // --- LOADING SCREEN ---
            if (isProcessing) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative overflow-hidden">
                        <div className="flex flex-col items-center animate-pulse">
                            <div className="w-12 h-12 sm:w-14 sm:h-14 border-4 border-[#282a2c] border-t-[#8ab4f8] rounded-full animate-spin mb-4"></div>
                            <h2 className="text-lg sm:text-xl font-medium text-[#e3e3e3]">Memproses Data...</h2>
                        </div>
                    </div>
                );
            }

            // --- WELCOME SCREEN ---
            if (appMode === 'welcome') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative overflow-hidden">
                        <div className="p-6 sm:p-10 card-flat max-w-lg w-full text-center relative z-10">
                            <div className="w-16 h-16 sm:w-20 sm:h-20 bg-[#282a2c] text-[#8ab4f8] rounded-full flex items-center justify-center mx-auto mb-6">
                                <IconTrending />
                            </div>
                            <h2 className="text-2xl sm:text-3xl font-semibold text-[#e3e3e3] mb-3">Dashboard Distribusi</h2>
                            <p className="text-sm sm:text-base text-[#c4c7c5] mb-8 leading-relaxed">Pilih mode dashboard untuk memvisualisasikan data.</p>
                            
                            <div className="flex flex-col gap-4">
                                <label className="cursor-pointer bg-[#282a2c] hover:bg-[#333538] text-[#e3e3e3] px-4 py-3 sm:px-6 sm:py-4 rounded-xl flex items-center justify-center gap-3 transition-all">
                                    <IconUpload />
                                    <span className="font-medium text-base sm:text-lg">Mode Tunggal (F5/F6)</span>
                                    <input type="file" accept=".csv, .xlsx, .xls" onChange={handleSingleUpload} className="hidden" />
                                </label>
                                
                                <button onClick={() => setAppMode('compare_setup')} className="bg-[#282a2c] hover:bg-[#333538] text-[#c58af9] px-4 py-3 sm:px-6 sm:py-4 rounded-xl flex items-center justify-center gap-3 transition-all">
                                    <IconCompare />
                                    <span className="font-medium text-base sm:text-lg">Mode Perbandingan</span>
                                </button>
                            </div>
                            
                            <p className="mt-8 text-xs text-[#c4c7c5]">Mendukung format file .csv, .xlsx, dan .xls</p>
                        </div>
                        <footer className="text-center mt-12 text-xs text-[#c4c7c5] w-full">
                            <p className="whitespace-nowrap sm:whitespace-normal">Copyright &copy; 2025 Adm Pemasaran & Penjualan</p>
                            <p className="mt-1">Design by 00.0034</p>
                        </footer>
                    </div>
                );
            }

            // --- COMPARE SETUP SCREEN ---
            if (appMode === 'compare_setup') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative overflow-hidden">
                        <div className="p-6 sm:p-10 card-flat max-w-2xl w-full text-center relative z-10 animate-fade-in-up">
                            <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 sm:gap-0">
                                <button onClick={() => setAppMode('welcome')} className="text-[#c4c7c5] hover:text-[#e3e3e3] transition font-medium text-sm flex items-center gap-1 self-start sm:self-auto">
                                    &larr; Kembali
                                </button>
                                <h2 className="text-xl sm:text-2xl font-semibold text-[#e3e3e3]">Setup Perbandingan</h2>
                                <div className="hidden sm:block w-16"></div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 mb-8">
                                {/* Upload Box F5 */}
                                <label className={`cursor-pointer flex flex-col items-center justify-center p-6 sm:p-8 rounded-xl sm:rounded-2xl transition-all ${tempFileF5 ? 'bg-[#1b2f24]' : 'bg-[#282a2c] hover:bg-[#333538]'}`}>
                                    {tempFileF5 ? <div className="mb-2"><IconCheck /></div> : <div className="text-[#8ab4f8] mb-2"><IconUpload /></div>}
                                    <span className={`font-medium text-sm sm:text-base ${tempFileF5 ? 'text-[#81c995]' : 'text-[#8ab4f8]'}`}>1. Upload Data F5</span>
                                    <span className="text-xs text-[#c4c7c5] mt-2 truncate max-w-[200px] px-2">{tempFileF5 ? tempFileF5.name : 'Pilih file CSV/Excel'}</span>
                                    <input type="file" accept=".csv, .xlsx, .xls" onChange={(e) => setTempFileF5(e.target.files[0])} className="hidden" />
                                </label>

                                {/* Upload Box F6 */}
                                <label className={`cursor-pointer flex flex-col items-center justify-center p-6 sm:p-8 rounded-xl sm:rounded-2xl transition-all ${tempFileF6 ? 'bg-[#1b2f24]' : 'bg-[#282a2c] hover:bg-[#333538]'}`}>
                                    {tempFileF6 ? <div className="mb-2"><IconCheck /></div> : <div className="text-[#c58af9] mb-2"><IconUpload /></div>}
                                    <span className={`font-medium text-sm sm:text-base ${tempFileF6 ? 'text-[#81c995]' : 'text-[#c58af9]'}`}>2. Upload Data F6</span>
                                    <span className="text-xs text-[#c4c7c5] mt-2 truncate max-w-[200px] px-2">{tempFileF6 ? tempFileF6.name : 'Pilih file CSV/Excel'}</span>
                                    <input type="file" accept=".csv, .xlsx, .xls" onChange={(e) => setTempFileF6(e.target.files[0])} className="hidden" />
                                </label>
                            </div>
                            
                            <button 
                                onClick={executeComparison} 
                                disabled={!tempFileF5 || !tempFileF6}
                                className={`w-full py-3 sm:py-4 rounded-xl font-medium text-base sm:text-lg flex items-center justify-center gap-2 transition-all ${tempFileF5 && tempFileF6 ? 'bg-[#333538] text-[#e3e3e3] hover:bg-[#444746]' : 'bg-[#1e1f20] text-[#5f6368] cursor-not-allowed'}`}
                            >
                                <IconCompare /> Tampilkan Perbandingan
                            </button>
                        </div>
                    </div>
                );
            }

            // --- DASHBOARD UTAMA ---
            return (
                <div className="min-h-screen p-3 sm:p-6 relative animate-fade-in-up" id="dashboard-export-area">
                    {/* Header */}
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-8 p-4 sm:p-6 card-flat gap-4 sm:gap-0">
                        <div className="w-full sm:w-auto">
                            <h1 className="text-lg sm:text-2xl font-semibold text-[#e3e3e3] flex flex-wrap items-center gap-2">
                                <span className={dashboardType === 'compare' ? 'text-[#c58af9]' : 'text-[#8ab4f8]'}>
                                    {dashboardType === 'compare' ? <IconCompare /> : <IconTrending />}
                                </span>
                                Dashboard F5/F6
                                <span className="text-[10px] sm:text-xs font-medium px-2 sm:px-2.5 py-0.5 sm:py-1 rounded-full bg-[#282a2c] text-[#c4c7c5] ml-2">
                                    {dashboardType === 'compare' ? 'Mode Perbandingan' : 'Mode Tunggal'}
                                </span>
                            </h1>
                            <p className="text-[#c4c7c5] text-xs sm:text-sm mt-1">Monitoring Penebusan & Penyaluran Pupuk</p>
                        </div>
                        
                        {/* Tombol diletakkan di dalam div dengan data-html2canvas-ignore="true" agar tidak ikut masuk ke PDF */}
                        <div className="w-full sm:w-auto flex flex-wrap gap-2" data-html2canvas-ignore="true">
                            <button 
                                onClick={exportToPDF} 
                                disabled={isExporting} 
                                className="w-full sm:w-auto bg-[#282a2c] hover:bg-[#333538] text-[#8ab4f8] px-4 py-2 sm:py-2.5 rounded-lg flex items-center justify-center gap-2 transition font-medium text-sm disabled:opacity-60 disabled:cursor-wait"
                            >
                                <IconDownload />
                                {isExporting ? 'Mengekspor...' : 'Export PDF'}
                            </button>
                            <button 
                                onClick={() => { setAppMode('welcome'); setTempFileF5(null); setTempFileF6(null); }} 
                                className="w-full sm:w-auto bg-[#282a2c] hover:bg-[#333538] text-[#e3e3e3] px-4 py-2 sm:py-2.5 rounded-lg flex items-center justify-center gap-2 transition font-medium text-sm"
                            >
                                Ubah Data / Mode
                            </button>
                        </div>
                    </div>

                    {/* Filter Section */}
                    <div className="p-4 sm:p-6 card-flat mb-6 sm:mb-8">
                        <div className="flex items-center gap-2 mb-4 sm:mb-6 text-[#e3e3e3] font-medium text-base sm:text-lg">
                            <div className="text-[#c4c7c5]"><IconFilter /></div>
                            <span>Filter Data {dashboardType === 'compare' && <span className="text-xs sm:text-sm font-normal text-[#c4c7c5] ml-1">(F5 & F6)</span>}</span>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
                            <div>
                                <label className="block text-xs font-medium text-[#c4c7c5] mb-2 uppercase tracking-wide">Provinsi</label>
                                <div className="relative">
                                    <select className="w-full appearance-none input-flat rounded-lg p-2.5 sm:p-3 pr-8 text-sm transition cursor-pointer"
                                        value={filterProv} onChange={(e) => { setFilterProv(e.target.value); setFilterKab("All"); }}>
                                        <option value="All">Semua Provinsi</option>
                                        {uniqueProvinces.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-[#c4c7c5]"><IconChevronDown /></div>
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-medium text-[#c4c7c5] mb-2 uppercase tracking-wide">Kabupaten</label>
                                <div className="relative">
                                    <select className="w-full appearance-none input-flat rounded-lg p-2.5 sm:p-3 pr-8 text-sm transition cursor-pointer"
                                        value={filterKab} onChange={(e) => setFilterKab(e.target.value)}>
                                        <option value="All">Semua Kabupaten</option>
                                        {uniqueKabupaten.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-[#c4c7c5]"><IconChevronDown /></div>
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-medium text-[#c4c7c5] mb-2 uppercase tracking-wide">Produk</label>
                                <div className="relative">
                                    <select className="w-full appearance-none input-flat rounded-lg p-2.5 sm:p-3 pr-8 text-sm transition cursor-pointer"
                                        value={filterProd} onChange={(e) => setFilterProd(e.target.value)}>
                                        <option value="All">Semua Produk</option>
                                        {uniqueProducts.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-[#c4c7c5]"><IconChevronDown /></div>
                                </div>
                            </div>

                             <div>
                                <label className="block text-xs font-medium text-[#c4c7c5] mb-2 uppercase tracking-wide">Distributor</label>
                                <div className="relative">
                                    <select className="w-full appearance-none input-flat rounded-lg p-2.5 sm:p-3 pr-8 text-sm transition cursor-pointer"
                                        value={filterDistributor} onChange={(e) => setFilterDistributor(e.target.value)}>
                                        <option value="All">Semua Distributor</option>
                                        {uniqueDistributors.map(d => <option key={d} value={d}>{d}</option>)}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-[#c4c7c5]"><IconChevronDown /></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* KPI Cards */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 mb-6 sm:mb-8">
                        {dashboardType === 'single' ? (
                            <>
                                <div className="p-4 sm:p-6 card-flat">
                                    <p className="text-[#c4c7c5] text-xs sm:text-sm font-medium">Total Penyaluran</p>
                                    <h3 className="text-xl sm:text-2xl font-semibold text-[#8ab4f8] mt-2">{formatNumber(kpiSingle.totalPenyaluran)} <span className="text-[10px] sm:text-xs text-[#5f6368] font-normal">Ton</span></h3>
                                </div>
                                <div className="p-4 sm:p-6 card-flat">
                                    <p className="text-[#c4c7c5] text-xs sm:text-sm font-medium">Total Penebusan</p>
                                    <h3 className="text-xl sm:text-2xl font-semibold text-[#81c995] mt-2">{formatNumber(kpiSingle.totalPenebusan)} <span className="text-[10px] sm:text-xs text-[#5f6368] font-normal">Ton</span></h3>
                                </div>
                                <div className="p-4 sm:p-6 card-flat">
                                    <p className="text-[#c4c7c5] text-xs sm:text-sm font-medium">Rata-rata Stok Akhir</p>
                                    <h3 className="text-xl sm:text-2xl font-semibold text-[#fde293] mt-2">{formatNumber(kpiSingle.avgStokAkhir)} <span className="text-[10px] sm:text-xs text-[#5f6368] font-normal">Ton</span></h3>
                                </div>
                                <div className="p-4 sm:p-6 card-flat">
                                    <p className="text-[#c4c7c5] text-xs sm:text-sm font-medium">Distributor Aktif</p>
                                    <h3 className="text-xl sm:text-2xl font-semibold text-[#c58af9] mt-2">{kpiSingle.uniqueDistributors} <span className="text-[10px] sm:text-xs text-[#5f6368] font-normal">Entitas</span></h3>
                                </div>
                            </>
                        ) : (
                            <>
                                <div className="p-4 sm:p-5 card-flat">
                                    <p className="text-[#c4c7c5] text-xs sm:text-sm font-medium mb-3">Perbandingan Penyaluran</p>
                                    <div className="flex justify-between items-end mb-2"><span className="text-[10px] sm:text-xs text-[#5f6368]">F5:</span> <span className="text-sm sm:text-base font-medium text-[#8ab4f8]">{formatNumber(kpiCompare.F5_Penyaluran)} Ton</span></div>
                                    <div className="flex justify-between items-end"><span className="text-[10px] sm:text-xs text-[#5f6368]">F6:</span> <span className="text-sm sm:text-base font-medium text-[#c58af9]">{formatNumber(kpiCompare.F6_Penyaluran)} Ton</span></div>
                                </div>
                                <div className="p-4 sm:p-5 card-flat">
                                    <p className="text-[#c4c7c5] text-xs sm:text-sm font-medium mb-3">Perbandingan Penebusan</p>
                                    <div className="flex justify-between items-end mb-2"><span className="text-[10px] sm:text-xs text-[#5f6368]">F5:</span> <span className="text-sm sm:text-base font-medium text-[#8ab4f8]">{formatNumber(kpiCompare.F5_Penebusan)} Ton</span></div>
                                    <div className="flex justify-between items-end"><span className="text-[10px] sm:text-xs text-[#5f6368]">F6:</span> <span className="text-sm sm:text-base font-medium text-[#c58af9]">{formatNumber(kpiCompare.F6_Penebusan)} Ton</span></div>
                                </div>
                                <div className="p-4 sm:p-5 card-flat">
                                    <p className="text-[#c4c7c5] text-xs sm:text-sm font-medium mb-3">Selisih Penyaluran (F5-F6)</p>
                                    <h3 className={`text-xl sm:text-2xl font-semibold mt-1 ${kpiCompare.F5_Penyaluran - kpiCompare.F6_Penyaluran >= 0 ? 'text-[#81c995]' : 'text-[#fcad70]'}`}>
                                        {formatNumber(kpiCompare.F5_Penyaluran - kpiCompare.F6_Penyaluran)} <span className="text-[10px] sm:text-xs text-[#5f6368] font-normal">Ton</span>
                                    </h3>
                                </div>
                                <div className="p-4 sm:p-5 card-flat">
                                    <p className="text-[#c4c7c5] text-xs sm:text-sm font-medium mb-3">Selisih Penebusan (F5-F6)</p>
                                    <h3 className={`text-xl sm:text-2xl font-semibold mt-1 ${kpiCompare.F5_Penebusan - kpiCompare.F6_Penebusan >= 0 ? 'text-[#81c995]' : 'text-[#fcad70]'}`}>
                                        {formatNumber(kpiCompare.F5_Penebusan - kpiCompare.F6_Penebusan)} <span className="text-[10px] sm:text-xs text-[#5f6368] font-normal">Ton</span>
                                    </h3>
                                </div>
                            </>
                        )}
                    </div>

                    {/* Charts Section 1: Trend & Product Mix */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6 mb-6 sm:mb-8">
                        {/* Trend Chart */}
                        <div className="p-4 sm:p-6 card-flat lg:col-span-2">
                            <h3 className="text-base sm:text-lg font-medium text-[#e3e3e3] mb-6">
                                <span className="truncate">{dashboardType === 'single' ? 'Tren Penebusan vs Penyaluran' : 'Perbandingan F5 vs F6 per Bulan'}</span>
                            </h3>
                            <div className="h-64 sm:h-80 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    {dashboardType === 'single' ? (
                                        <AreaChart data={trendData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                                            <defs>
                                                <linearGradient id="colorPenebusan" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#81c995" stopOpacity={0.4}/><stop offset="95%" stopColor="#81c995" stopOpacity={0}/></linearGradient>
                                                <linearGradient id="colorPenyaluran" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#8ab4f8" stopOpacity={0.4}/><stop offset="95%" stopColor="#8ab4f8" stopOpacity={0}/></linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#282a2c"/>
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} dy={10} style={{ fontSize: '10px', fill: '#c4c7c5' }}/>
                                            <YAxis tickFormatter={formatYAxis} axisLine={false} tickLine={false} dx={-10} style={{ fontSize: '10px', fill: '#c4c7c5' }}/>
                                            <Tooltip formatter={(value) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(value)} contentStyle={tooltipStyle} itemStyle={{color: '#e3e3e3'}}/>
                                            <Legend wrapperStyle={{ paddingTop: '10px', fontSize: '12px', color: '#c4c7c5' }}/>
                                            <Area type="monotone" dataKey="Penebusan" stroke="#81c995" strokeWidth={2} fillOpacity={1} fill="url(#colorPenebusan)" />
                                            <Area type="monotone" dataKey="Penyaluran" stroke="#8ab4f8" strokeWidth={2} fillOpacity={1} fill="url(#colorPenyaluran)" />
                                        </AreaChart>
                                    ) : (
                                        <BarChart data={trendData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#282a2c"/>
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} dy={10} style={{ fontSize: '10px', fill: '#c4c7c5' }}/>
                                            <YAxis tickFormatter={formatYAxis} axisLine={false} tickLine={false} dx={-10} style={{ fontSize: '10px', fill: '#c4c7c5' }}/>
                                            <Tooltip formatter={(value) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(value) + ' Ton'} cursor={{fill: '#282a2c'}} contentStyle={tooltipStyle} itemStyle={{color: '#e3e3e3'}}/>
                                            <Legend wrapperStyle={{ paddingTop: '10px', fontSize: '12px', color: '#c4c7c5' }}/>
                                            <Bar dataKey="F5_Penyaluran" name="F5 Penyaluran" fill="#8ab4f8" radius={[4, 4, 0, 0]} />
                                            <Bar dataKey="F6_Penyaluran" name="F6 Penyaluran" fill="#c58af9" radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    )}
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Product Chart */}
                        <div className="p-4 sm:p-6 card-flat">
                             <h3 className="text-base sm:text-lg font-medium text-[#e3e3e3] mb-6">
                                <span className="truncate">{dashboardType === 'single' ? 'Komposisi Produk' : 'Penyaluran Produk'}</span>
                            </h3>
                            <div className="h-64 sm:h-80 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    {dashboardType === 'single' ? (
                                        <PieChart>
                                            <Pie data={productData} cx="50%" cy="50%" innerRadius={50} outerRadius={80} fill="#8ab4f8" paddingAngle={5} dataKey="value" stroke="none" labelLine={false} label={({name, percent}) => percent > 0.05 ? `${(percent * 100).toFixed(0)}%` : ''}>
                                                {productData.map((entry, index) => <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />)}
                                            </Pie>
                                            <Tooltip formatter={(value) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(value)} contentStyle={tooltipStyle} itemStyle={{color: '#e3e3e3'}}/>
                                            <Legend verticalAlign="bottom" height={36} wrapperStyle={{ fontSize: '11px', color: '#c4c7c5' }}/>
                                        </PieChart>
                                    ) : (
                                        <BarChart data={productData} layout="vertical" margin={{ top: 0, right: 10, left: 10, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#282a2c"/>
                                            <XAxis type="number" tickFormatter={formatYAxis} axisLine={false} tickLine={false} style={{ fontSize: '10px', fill: '#c4c7c5' }}/>
                                            <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} width={70} style={{ fontSize: '10px', fill: '#e3e3e3' }}/>
                                            <Tooltip formatter={(value) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(value) + ' Ton'} cursor={{fill: '#282a2c'}} contentStyle={tooltipStyle} itemStyle={{color: '#e3e3e3'}}/>
                                            <Legend wrapperStyle={{ paddingTop: '10px', fontSize: '12px', color: '#c4c7c5' }}/>
                                            <Bar dataKey="F5_Value" name="F5" fill="#8ab4f8" radius={[0, 4, 4, 0]} barSize={12} />
                                            <Bar dataKey="F6_Value" name="F6" fill="#c58af9" radius={[0, 4, 4, 0]} barSize={12} />
                                        </BarChart>
                                    )}
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>

                    {/* Charts Section 2: LISTS (Top Wilayah & Top Produsen) */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 mb-6 sm:mb-8">
                         {/* List Top 10 Wilayah */}
                         <div className="p-4 sm:p-6 card-flat flex flex-col h-full">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-base sm:text-lg font-medium text-[#e3e3e3] truncate">
                                    <span className="truncate">Top 10 {filterProv === "All" ? "Provinsi" : "Kabupaten"}</span>
                                </h3>
                                <select 
                                    className="text-[10px] sm:text-xs input-flat rounded-md px-2 py-1 ml-2"
                                    value={metricWilayah} onChange={(e) => setMetricWilayah(e.target.value)}
                                >
                                    <option value="Penyaluran">Penyaluran</option>
                                    <option value="Penebusan">Penebusan</option>
                                </select>
                            </div>
                            <div className="flex-grow overflow-y-auto custom-scrollbar pr-1 sm:pr-2 max-h-64 sm:max-h-80">
                                {wilayahData.length === 0 ? <div className="text-center text-[#5f6368] py-10 text-sm">Tidak ada data</div> : (
                                    <ul className="space-y-2">
                                        {wilayahData.map((item, index) => (
                                            <li key={index} className="flex items-center justify-between p-3 rounded-lg list-item-flat transition">
                                                <div className="flex items-center gap-3 overflow-hidden">
                                                    <span className="text-[10px] sm:text-xs font-medium text-[#5f6368] w-4">{index + 1}</span>
                                                    <span className="font-medium text-sm sm:text-base text-[#e3e3e3] truncate max-w-[150px] sm:max-w-[250px]" title={item.name}>{item.name}</span>
                                                </div>
                                                <div className="text-right flex-shrink-0 pl-2">
                                                    <span className="block font-medium text-sm sm:text-base text-[#e3e3e3]">{formatNumber(item.value)}</span>
                                                    <span className="text-[10px] text-[#5f6368]">Ton</span>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        </div>

                        {/* List Top Distributor */}
                        <div className="p-4 sm:p-6 card-flat flex flex-col h-full">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-base sm:text-lg font-medium text-[#e3e3e3] truncate">
                                    <span className="truncate">Top Distributor</span>
                                </h3>
                                <select 
                                    className="text-[10px] sm:text-xs input-flat rounded-md px-2 py-1 ml-2"
                                    value={metricDistributor} onChange={(e) => setMetricDistributor(e.target.value)}
                                >
                                    <option value="Penyaluran">Penyaluran</option>
                                    <option value="Penebusan">Penebusan</option>
                                </select>
                            </div>
                            <div className="flex-grow overflow-y-auto custom-scrollbar pr-1 sm:pr-2 max-h-64 sm:max-h-80">
                                {distributorData.length === 0 ? <div className="text-center text-[#5f6368] py-10 text-sm">Tidak ada data</div> : (
                                    <ul className="space-y-2">
                                        {distributorData.map((item, index) => (
                                            <li key={index} className="flex items-center justify-between p-3 rounded-lg list-item-flat transition">
                                                <div className="flex items-center gap-3 overflow-hidden">
                                                    <span className="text-[10px] sm:text-xs font-medium text-[#5f6368] w-4">{index + 1}</span>
                                                    <span className="font-medium text-sm sm:text-base text-[#e3e3e3] truncate max-w-[150px] sm:max-w-[250px]" title={item.name}>{item.name}</span>
                                                </div>
                                                <div className="text-right flex-shrink-0 pl-2">
                                                    <span className="block font-medium text-sm sm:text-base text-[#e3e3e3]">{formatNumber(item.value)}</span>
                                                    <span className="text-[10px] text-[#5f6368]">Ton</span>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="text-center mt-10 sm:mt-12 mb-2 sm:mb-4 text-xs text-[#5f6368] w-full">
                        <p className="whitespace-nowrap sm:whitespace-normal">Copyright &copy; 2025 Adm Pemasaran & Penjualan</p>
                        <p className="mt-1">Design by 00.0034</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
