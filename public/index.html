<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard F5/F6 - Light/Dark Mode</title>
    
    <!-- React & ReactDOM (v18) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (untuk JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS (Konfigurasi Mode Gelap Berdasarkan Class) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <!-- Prop Types -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
    
    <!-- PapaParse & SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- html2canvas & jsPDF for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease;
        } 
        
        /* Tema Gelap (Gemini) pada Elemen HTML/Body */
        html.dark body { background-color: #131314; color: #e3e3e3; }
        html:not(.dark) body { background-color: #f8fafc; color: #1e293b; }

        /* Custom scrollbar untuk kedua mode */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        @media (min-width: 640px) { .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; } }
        
        /* Scrollbar Mode Terang */
        html:not(.dark) .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        html:not(.dark) .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; } 
        html:not(.dark) .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; } 

        /* Scrollbar Mode Gelap */
        html.dark .custom-scrollbar::-webkit-scrollbar-track { background: #131314; border-radius: 4px; }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #444746; border-radius: 4px; } 
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #5f6368; } 

        /* Warna Dropdown Options */
        html.dark option { background-color: #1e1f20; color: #e3e3e3; }
        html:not(.dark) option { background-color: #ffffff; color: #1e293b; }
        
        /* Animasi */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="selection:bg-blue-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            AreaChart, Area, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, BarChart, Bar 
        } = window.Recharts || {};

        const MONTH_NAMES = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];

        // --- Icons ---
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const IconCompare = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 3h5v5M4 21v-7a4 4 0 0 1 4-4h11M8 21H3v-5M20 3v7a4 4 0 0 1-4 4H5"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#81c995" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconTrending = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const IconFilter = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
        const IconChevronDown = () => <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconSun = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
        const IconMoon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;

        const App = () => {
            // Mode Gelap State (Default Aktif)
            const [isDarkMode, setIsDarkMode] = useState(true);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const [appMode, setAppMode] = useState('welcome');
            const [dashboardType, setDashboardType] = useState('single');
            
            const [rawData, setRawData] = useState([]);
            const [filteredData, setFilteredData] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isExporting, setIsExporting] = useState(false);

            const [tempFileF5, setTempFileF5] = useState(null);
            const [tempFileF6, setTempFileF6] = useState(null);

            const [filterProv, setFilterProv] = useState("All");
            const [filterKab, setFilterKab] = useState("All");
            const [filterProd, setFilterProd] = useState("All");
            const [filterDistributor, setFilterDistributor] = useState("All");

            const [metricWilayah, setMetricWilayah] = useState("Penyaluran");
            const [metricDistributor, setMetricDistributor] = useState("Penyaluran");

            // --- Palet Warna Dinamis untuk Recharts ---
            const chartColors = {
                grid: isDarkMode ? '#282a2c' : '#e2e8f0',
                text: isDarkMode ? '#c4c7c5' : '#64748b',
                tooltipBg: isDarkMode ? '#282a2c' : '#ffffff',
                tooltipText: isDarkMode ? '#e3e3e3' : '#1e293b',
                tooltipShadow: isDarkMode ? 'none' : '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                pieStroke: isDarkMode ? 'none' : '#ffffff',
                f5Area: isDarkMode ? '#8ab4f8' : '#3b82f6',
                f6Area: isDarkMode ? '#c58af9' : '#8b5cf6',
                penebusanArea: isDarkMode ? '#81c995' : '#10b981',
                pieColors: isDarkMode 
                    ? ['#8ab4f8', '#81c995', '#fde293', '#fcad70', '#c58af9', '#6ee7b7'] 
                    : ['#3b82f6', '#10b981', '#f59e0b', '#f97316', '#8b5cf6', '#34d399']
            };

            const parseIndonesianNumber = (val) => {
                if (val === undefined || val === null || val === '') return 0;
                if (typeof val === 'number') return val;
                
                let strVal = val.toString().trim();
                
                if (strVal.includes(',') && strVal.includes('.')) {
                    const lastComma = strVal.lastIndexOf(',');
                    const lastDot = strVal.lastIndexOf('.');
                    if (lastComma > lastDot) strVal = strVal.replace(/\./g, '').replace(/,/g, '.');
                    else strVal = strVal.replace(/,/g, '');
                } 
                else if (strVal.includes(',')) strVal = strVal.replace(/,/g, '.');
                else if (strVal.split('.').length > 2) strVal = strVal.replace(/\./g, '');
                
                return parseFloat(strVal) || 0;
            };

            const processFile = (file, datasetTag, callback) => {
                const fileExt = file.name.split('.').pop().toLowerCase();

                const cleanData = (arrayOfArrays) => {
                    let headerIndex = -1;
                    for (let i = 0; i < Math.min(arrayOfArrays.length, 10); i++) {
                        const rowStr = (arrayOfArrays[i] || []).join('').toLowerCase();
                        if (rowStr.includes('produsen') || rowStr.includes('distributor') || rowStr.includes('provinsi')) {
                            headerIndex = i;
                            break;
                        }
                    }
                    if (headerIndex === -1) headerIndex = 0;

                    const headers = arrayOfArrays[headerIndex].map(h => typeof h === 'string' ? h.trim().toLowerCase() : '');
                    
                    const getColIdx = (keys) => {
                        for (let k of keys) {
                            const idx = headers.findIndex(h => h === k);
                            if (idx !== -1) return idx;
                        }
                        return -1;
                    };

                    const cols = {
                        produsen: getColIdx(['produsen', 'kode produsen']),
                        distributor: getColIdx(['nama distributor', 'distributor']),
                        pengecer: getColIdx(['nama pengecer', 'pengecer']),
                        bulan: getColIdx(['bulan']),
                        provinsi: getColIdx(['nama provinsi', 'provinsi']),
                        kabupaten: getColIdx(['nama kota/kabupaten', 'nama kota/kab', 'kabupaten', 'kota']),
                        kecamatan: getColIdx(['nama kecamatan', 'kecamatan']),
                        produk: getColIdx(['produk']),
                        stokAwal: getColIdx(['stok awal']),
                        penebusan: getColIdx(['penebusan']),
                        penyaluran: getColIdx(['penyaluran']),
                        stokAkhir: getColIdx(['stok akhir'])
                    };

                    const formattedData = [];
                    for (let i = headerIndex + 1; i < arrayOfArrays.length; i++) {
                        const row = arrayOfArrays[i];
                        if (!row || row.length === 0) continue;

                        const bulanVal = parseInt(row[cols.bulan]) || 0;
                        if (bulanVal <= 0) continue; 

                        const stokAwal = parseIndonesianNumber(row[cols.stokAwal]);
                        const penebusan = parseIndonesianNumber(row[cols.penebusan]);
                        const penyaluran = parseIndonesianNumber(row[cols.penyaluran]);
                        const stokAkhir = parseIndonesianNumber(row[cols.stokAkhir]);

                        if (penebusan > 0 || penyaluran > 0 || stokAwal > 0 || stokAkhir > 0) {
                            formattedData.push({
                                dataset: datasetTag,
                                Produsen: cols.produsen !== -1 ? (row[cols.produsen] || "N/A") : "N/A",
                                Nama_Distributor: cols.distributor !== -1 ? (row[cols.distributor] || "Unknown") : "Unknown",
                                Nama_Pengecer: cols.pengecer !== -1 ? (row[cols.pengecer] || "") : "",
                                Bulan: bulanVal,
                                Provinsi: cols.provinsi !== -1 ? (row[cols.provinsi] || "Unknown") : "Unknown",
                                Kabupaten: cols.kabupaten !== -1 ? (row[cols.kabupaten] || "Unknown") : "Unknown",
                                Kecamatan: cols.kecamatan !== -1 ? (row[cols.kecamatan] || "Unknown") : "Unknown",
                                Produk: cols.produk !== -1 ? (row[cols.produk] || "Unknown") : "Unknown",
                                Stok_Awal: stokAwal,
                                Penebusan: penebusan,
                                Penyaluran: penyaluran,
                                Stok_Akhir: stokAkhir
                            });
                        }
                    }
                    return formattedData;
                };

                if (fileExt === 'csv') {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        Papa.parse(e.target.result, {
                            header: false,
                            skipEmptyLines: true,
                            complete: (results) => callback(cleanData(results.data))
                        });
                    };
                    reader.readAsText(file);
                } else if (fileExt === 'xlsx' || fileExt === 'xls') {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0]; 
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" }); 
                        callback(cleanData(json));
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    console.error("Format file tidak didukung");
                    callback([]);
                }
            };

            const handleSingleUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsProcessing(true);
                processFile(file, 'Single', (data) => {
                    setTimeout(() => {
                        setRawData(data);
                        setFilteredData(data);
                        setDashboardType('single');
                        setAppMode('dashboard');
                        setIsProcessing(false);
                        resetFilters();
                    }, 500);
                });
            };

            const executeComparison = () => {
                if (!tempFileF5 || !tempFileF6) return;
                setIsProcessing(true);
                processFile(tempFileF5, 'F5', (dataF5) => {
                    processFile(tempFileF6, 'F6', (dataF6) => {
                        setTimeout(() => {
                            const combinedData = [...dataF5, ...dataF6];
                            setRawData(combinedData);
                            setFilteredData(combinedData);
                            setDashboardType('compare');
                            setAppMode('dashboard');
                            setIsProcessing(false);
                            resetFilters();
                        }, 500);
                    });
                });
            };

            const resetFilters = () => {
                setFilterProv("All"); setFilterKab("All"); setFilterProd("All"); setFilterDistributor("All");
            };

            const exportToPDF = async () => {
                const dashboardElement = document.getElementById('dashboard-export-area');
                if (!dashboardElement) return;

                setIsExporting(true);
                try {
                    const canvas = await html2canvas(dashboardElement, {
                        scale: 2, 
                        backgroundColor: isDarkMode ? '#131314' : '#f8fafc', 
                        useCORS: true,
                        logging: false
                    });
                    
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new window.jspdf.jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    
                    const imgProps = pdf.getImageProperties(imgData);
                    const ratio = Math.min(pdfWidth / imgProps.width, pdfHeight / imgProps.height);
                    
                    const imgWidth = imgProps.width * ratio;
                    const imgHeight = imgProps.height * ratio;
                    const marginX = (pdfWidth - imgWidth) / 2;
                    const marginY = (pdfHeight - imgHeight) / 2;

                    pdf.addImage(imgData, 'PNG', marginX, marginY, imgWidth, imgHeight);
                    pdf.save(`Dashboard_${dashboardType === 'compare' ? 'F5_F6' : 'F5/F6'}_${new Date().toISOString().slice(0,10)}.pdf`);
                } catch (error) {
                    console.error("Gagal export PDF:", error);
                    alert("Terjadi kesalahan saat mengekspor PDF.");
                } finally {
                    setIsExporting(false);
                }
            };

            useEffect(() => {
                let temp = rawData;
                if (filterProv !== "All") temp = temp.filter(d => d.Provinsi === filterProv);
                if (filterKab !== "All") temp = temp.filter(d => d.Kabupaten === filterKab);
                if (filterProd !== "All") temp = temp.filter(d => d.Produk === filterProd);
                if (filterDistributor !== "All") temp = temp.filter(d => d.Nama_Distributor === filterDistributor);
                setFilteredData(temp);
            }, [filterProv, filterKab, filterProd, filterDistributor, rawData]);

            // --- DATA AGGREGATION ---
            const kpiSingle = useMemo(() => ({
                totalPenyaluran: filteredData.reduce((acc, curr) => acc + curr.Penyaluran, 0),
                totalPenebusan: filteredData.reduce((acc, curr) => acc + curr.Penebusan, 0),
                avgStokAkhir: filteredData.length ? filteredData.reduce((acc, curr) => acc + curr.Stok_Akhir, 0) / filteredData.length : 0,
                uniqueDistributors: new Set(filteredData.map(d => d.Nama_Distributor)).size
            }), [filteredData]);

            const kpiCompare = useMemo(() => {
                const dataF5 = filteredData.filter(d => d.dataset === 'F5');
                const dataF6 = filteredData.filter(d => d.dataset === 'F6');
                return {
                    F5_Penyaluran: dataF5.reduce((acc, curr) => acc + curr.Penyaluran, 0),
                    F6_Penyaluran: dataF6.reduce((acc, curr) => acc + curr.Penyaluran, 0),
                    F5_Penebusan: dataF5.reduce((acc, curr) => acc + curr.Penebusan, 0),
                    F6_Penebusan: dataF6.reduce((acc, curr) => acc + curr.Penebusan, 0),
                };
            }, [filteredData]);

            const trendData = useMemo(() => {
                const grouped = {};
                filteredData.forEach(d => {
                    if (!grouped[d.Bulan]) grouped[d.Bulan] = { name: MONTH_NAMES[d.Bulan-1], Penyaluran: 0, Penebusan: 0, F5_Penyaluran: 0, F6_Penyaluran: 0 };
                    if (dashboardType === 'single') {
                        grouped[d.Bulan].Penyaluran += d.Penyaluran;
                        grouped[d.Bulan].Penebusan += d.Penebusan;
                    } else {
                        if (d.dataset === 'F5') grouped[d.Bulan].F5_Penyaluran += d.Penyaluran;
                        if (d.dataset === 'F6') grouped[d.Bulan].F6_Penyaluran += d.Penyaluran;
                    }
                });
                return Object.values(grouped).sort((a,b) => MONTH_NAMES.indexOf(a.name) - MONTH_NAMES.indexOf(b.name));
            }, [filteredData, dashboardType]);

            const productData = useMemo(() => {
                const grouped = {};
                filteredData.forEach(d => {
                    if (!grouped[d.Produk]) grouped[d.Produk] = { name: d.Produk, value: 0, F5_Value: 0, F6_Value: 0 };
                    if (dashboardType === 'single') grouped[d.Produk].value += d.Penyaluran;
                    else {
                        if (d.dataset === 'F5') grouped[d.Produk].F5_Value += d.Penyaluran;
                        if (d.dataset === 'F6') grouped[d.Produk].F6_Value += d.Penyaluran;
                    }
                });
                return Object.values(grouped).sort((a,b) => (b.value || b.F6_Value) - (a.value || a.F6_Value));
            }, [filteredData, dashboardType]);

            const wilayahData = useMemo(() => {
                const grouped = {};
                const groupKey = filterProv === "All" ? "Provinsi" : "Kabupaten";
                filteredData.forEach(d => {
                    if (!grouped[d[groupKey]]) grouped[d[groupKey]] = 0;
                    grouped[d[groupKey]] += d[metricWilayah]; 
                });
                return Object.entries(grouped).map(([name, value]) => ({ name, value })).sort((a,b) => b.value - a.value).slice(0, 10); 
            }, [filteredData, metricWilayah, filterProv]);

            const distributorData = useMemo(() => {
                const grouped = {};
                filteredData.forEach(d => {
                    if (!grouped[d.Nama_Distributor]) grouped[d.Nama_Distributor] = 0;
                    grouped[d.Nama_Distributor] += d[metricDistributor];
                });
                return Object.entries(grouped).map(([name, value]) => ({ name, value })).sort((a,b) => b.value - a.value).slice(0, 10); 
            }, [filteredData, metricDistributor]);

            const uniqueProvinces = useMemo(() => [...new Set(rawData.map(d => d.Provinsi))].filter(Boolean).sort(), [rawData]);
            const uniqueKabupaten = useMemo(() => {
                let options = rawData;
                if (filterProv !== "All") options = options.filter(d => d.Provinsi === filterProv);
                return [...new Set(options.map(d => d.Kabupaten))].filter(Boolean).sort();
            }, [rawData, filterProv]);
            const uniqueProducts = useMemo(() => [...new Set(rawData.map(d => d.Produk))].filter(Boolean).sort(), [rawData]);
            const uniqueDistributors = useMemo(() => [...new Set(rawData.map(d => d.Nama_Distributor))].filter(Boolean).sort(), [rawData]);

            const formatNumber = (num) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(num);
            const formatYAxis = (tickItem) => {
                if (tickItem >= 1000000) return (tickItem / 1000000).toLocaleString('id-ID', { maximumFractionDigits: 1 }) + ' jt';
                else if (tickItem >= 1000) return (tickItem / 1000).toLocaleString('id-ID', { maximumFractionDigits: 1 }) + ' rb';
                return tickItem.toLocaleString('id-ID');
            };

            // --- LOADING SCREEN ---
            if (isProcessing) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative overflow-hidden">
                        <div className="flex flex-col items-center animate-pulse">
                            <div className="w-12 h-12 sm:w-14 sm:h-14 border-4 border-slate-200 dark:border-[#282a2c] border-t-blue-500 dark:border-t-[#8ab4f8] rounded-full animate-spin mb-4"></div>
                            <h2 className="text-lg sm:text-xl font-medium text-slate-800 dark:text-[#e3e3e3]">Memproses Data...</h2>
                        </div>
                    </div>
                );
            }

            // --- WELCOME SCREEN ---
            if (appMode === 'welcome') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative overflow-hidden">
                        
                        {/* Tema Toggle Button (Welcome Screen) */}
                        <div className="absolute top-6 right-6">
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-3 bg-white dark:bg-[#1e1f20] text-slate-500 dark:text-[#e3e3e3] rounded-full shadow-md dark:shadow-none transition-colors hover:bg-slate-50 dark:hover:bg-[#282a2c]">
                                {isDarkMode ? <IconSun /> : <IconMoon />}
                            </button>
                        </div>

                        <div className="p-6 sm:p-10 bg-white dark:bg-[#1e1f20] shadow-xl dark:shadow-none rounded-2xl max-w-lg w-full text-center relative z-10">

                                            <XAxis dataKey="name" axisLine={false} tickLine={false} dy={10} style={{ fontSize: '10px', fill: chartColors.text }}/>
                                            <YAxis tickFormatter={formatYAxis} axisLine={false} tickLine={false} dx={-10} style={{ fontSize: '10px', fill: chartColors.text }}/>
                                            <Tooltip formatter={(value) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(value) + ' Ton'} cursor={{fill: chartColors.grid}} contentStyle={{ backgroundColor: chartColors.tooltipBg, border: 'none', color: chartColors.tooltipText, borderRadius: '8px', padding: '12px', boxShadow: chartColors.tooltipShadow }} itemStyle={{color: chartColors.tooltipText}}/>
                                            <Legend wrapperStyle={{ paddingTop: '10px', fontSize: '12px', color: chartColors.text }}/>
                                            <Bar dataKey="F5_Penyaluran" name="F5 Penyaluran" fill={chartColors.f5Area} radius={[4, 4, 0, 0]} />
                                            <Bar dataKey="F6_Penyaluran" name="F6 Penyaluran" fill={chartColors.f6Area} radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    )}
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Product Chart */}
                        <div className="p-4 sm:p-6 bg-white dark:bg-[#1e1f20] shadow-sm dark:shadow-none rounded-xl">
                             <h3 className="text-base sm:text-lg font-medium text-slate-800 dark:text-[#e3e3e3] mb-6 flex items-start sm:items-center gap-2">
                                <span className="w-1 h-5 sm:h-6 bg-amber-500 rounded-full flex-shrink-0 mt-0.5 sm:mt-0"></span>
                                <span className="leading-snug break-words">{dashboardType === 'single' ? 'Komposisi Produk' : 'Penyaluran Produk'}</span>
                            </h3>
                            <div className="h-64 sm:h-80 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    {dashboardType === 'single' ? (
                                        <PieChart>
                                            <Pie data={productData} cx="50%" cy="50%" innerRadius={50} outerRadius={80} fill={chartColors.f5Area} paddingAngle={5} dataKey="value" stroke={chartColors.pieStroke} labelLine={false} label={({name, percent}) => percent > 0.05 ? `${(percent * 100).toFixed(0)}%` : ''}>
                                                {productData.map((entry, index) => <Cell key={`cell-${index}`} fill={chartColors.pieColors[index % chartColors.pieColors.length]} />)}
                                            </Pie>
                                            <Tooltip formatter={(value) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(value)} contentStyle={{ backgroundColor: chartColors.tooltipBg, border: 'none', color: chartColors.tooltipText, borderRadius: '8px', padding: '12px', boxShadow: chartColors.tooltipShadow }} itemStyle={{color: chartColors.tooltipText}}/>
                                            <Legend verticalAlign="bottom" height={36} wrapperStyle={{ fontSize: '11px', color: chartColors.text }}/>
                                        </PieChart>
                                    ) : (
                                        <BarChart data={productData} layout="vertical" margin={{ top: 0, right: 10, left: 10, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke={chartColors.grid}/>
                                            <XAxis type="number" tickFormatter={formatYAxis} axisLine={false} tickLine={false} style={{ fontSize: '10px', fill: chartColors.text }}/>
                                            <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} width={70} style={{ fontSize: '10px', fill: chartColors.tooltipText }}/>
                                            <Tooltip formatter={(value) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(value) + ' Ton'} cursor={{fill: chartColors.grid}} contentStyle={{ backgroundColor: chartColors.tooltipBg, border: 'none', color: chartColors.tooltipText, borderRadius: '8px', padding: '12px', boxShadow: chartColors.tooltipShadow }} itemStyle={{color: chartColors.tooltipText}}/>
                                            <Legend wrapperStyle={{ paddingTop: '10px', fontSize: '12px', color: chartColors.text }}/>
                                            <Bar dataKey="F5_Value" name="F5" fill={chartColors.f5Area} radius={[0, 4, 4, 0]} barSize={12} />
                                            <Bar dataKey="F6_Value" name="F6" fill={chartColors.f6Area} radius={[0, 4, 4, 0]} barSize={12} />
                                        </BarChart>
                                    )}
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>

                    {/* Charts Section 2: LISTS (Top Wilayah & Top Produsen) */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 mb-6 sm:mb-8">
                         {/* List Top 10 Wilayah */}
                         <div className="p-4 sm:p-6 bg-white dark:bg-[#1e1f20] shadow-sm dark:shadow-none rounded-xl flex flex-col h-full">
                            <div className="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center mb-6 gap-3">
                                <h3 className="text-base sm:text-lg font-medium text-slate-800 dark:text-[#e3e3e3] flex items-start sm:items-center gap-2">
                                    <span className="w-1 h-5 sm:h-6 bg-indigo-500 rounded-full flex-shrink-0 mt-0.5 sm:mt-0"></span>
                                    <span className="leading-snug break-words">Top 10 {filterProv === "All" ? "Provinsi" : "Kabupaten"}</span>
                                </h3>
                                <select 
                                    className="text-[10px] sm:text-xs bg-slate-50 hover:bg-slate-100 dark:bg-[#282a2c] dark:hover:bg-[#333538] text-slate-700 dark:text-[#e3e3e3] rounded-md px-2 py-1 flex-shrink-0 border border-slate-200 dark:border-transparent outline-none cursor-pointer transition"
                                    value={metricWilayah} onChange={(e) => setMetricWilayah(e.target.value)}
                                >
                                    <option value="Penyaluran">Penyaluran</option>
                                    <option value="Penebusan">Penebusan</option>
                                </select>
                            </div>
                            <div className="flex-grow overflow-y-auto custom-scrollbar pr-1 sm:pr-2 max-h-64 sm:max-h-80">
                                {wilayahData.length === 0 ? <div className="text-center text-slate-400 dark:text-[#5f6368] py-10 text-sm">Tidak ada data</div> : (
                                    <ul className="space-y-2">
                                        {wilayahData.map((item, index) => (
                                            <li key={index} className="flex items-start sm:items-center justify-between p-3 rounded-lg bg-slate-50 hover:bg-slate-100 dark:bg-[#282a2c] dark:hover:bg-[#333538] transition border border-slate-100 dark:border-transparent">
                                                <div className="flex items-start sm:items-center gap-3 flex-1 pr-2">
                                                    <span className="text-[10px] sm:text-xs font-medium text-slate-500 dark:text-[#5f6368] w-4 flex-shrink-0 mt-0.5 sm:mt-0">{index + 1}</span>
                                                    <span className="font-medium text-sm sm:text-base text-slate-800 dark:text-[#e3e3e3] break-words leading-tight">{item.name}</span>
                                                </div>
                                                <div className="text-right flex-shrink-0 pl-2">
                                                    <span className="block font-medium text-sm sm:text-base text-slate-800 dark:text-[#e3e3e3]">{formatNumber(item.value)}</span>
                                                    <span className="text-[10px] text-slate-400 dark:text-[#5f6368]">Ton</span>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        </div>

                        {/* List Top Distributor */}
                        <div className="p-4 sm:p-6 bg-white dark:bg-[#1e1f20] shadow-sm dark:shadow-none rounded-xl flex flex-col h-full">
                            <div className="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center mb-6 gap-3">
                                <h3 className="text-base sm:text-lg font-medium text-slate-800 dark:text-[#e3e3e3] flex items-start sm:items-center gap-2">
                                    <span className="w-1 h-5 sm:h-6 bg-emerald-500 rounded-full flex-shrink-0 mt-0.5 sm:mt-0"></span>
                                    <span className="leading-snug break-words">Top Distributor</span>
                                </h3>
                                <select 
                                    className="text-[10px] sm:text-xs bg-slate-50 hover:bg-slate-100 dark:bg-[#282a2c] dark:hover:bg-[#333538] text-slate-700 dark:text-[#e3e3e3] rounded-md px-2 py-1 flex-shrink-0 border border-slate-200 dark:border-transparent outline-none cursor-pointer transition"
                                    value={metricDistributor} onChange={(e) => setMetricDistributor(e.target.value)}
                                >
                                    <option value="Penyaluran">Penyaluran</option>
                                    <option value="Penebusan">Penebusan</option>
                                </select>
                            </div>
                            <div className="flex-grow overflow-y-auto custom-scrollbar pr-1 sm:pr-2 max-h-64 sm:max-h-80">
                                {distributorData.length === 0 ? <div className="text-center text-slate-400 dark:text-[#5f6368] py-10 text-sm">Tidak ada data</div> : (
                                    <ul className="space-y-2">
                                        {distributorData.map((item, index) => (
                                            <li key={index} className="flex items-start sm:items-center justify-between p-3 rounded-lg bg-slate-50 hover:bg-slate-100 dark:bg-[#282a2c] dark:hover:bg-[#333538] transition border border-slate-100 dark:border-transparent">
                                                <div className="flex items-start sm:items-center gap-3 flex-1 pr-2">
                                                    <span className="text-[10px] sm:text-xs font-medium text-slate-500 dark:text-[#5f6368] w-4 flex-shrink-0 mt-0.5 sm:mt-0">{index + 1}</span>
                                                    <span className="font-medium text-sm sm:text-base text-slate-800 dark:text-[#e3e3e3] break-words leading-tight">{item.name}</span>
                                                </div>
                                                <div className="text-right flex-shrink-0 pl-2">
                                                    <span className="block font-medium text-sm sm:text-base text-slate-800 dark:text-[#e3e3e3]">{formatNumber(item.value)}</span>
                                                    <span className="text-[10px] text-slate-400 dark:text-[#5f6368]">Ton</span>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="text-center mt-10 sm:mt-12 mb-2 sm:mb-4 text-xs text-slate-400 dark:text-[#5f6368] w-full">
                        <p className="whitespace-nowrap sm:whitespace-normal">Copyright &copy; 2025 Adm Pemasaran & Penjualan</p>
                        <p className="mt-1">Design by 00.0034</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
